portfolio:
  initial_capital: 10000.0
  max_positions: 5
  max_position_size_pct: 0.05
  commission_per_trade: 1.0
  risk_profile: moderate
risk:
  max_daily_loss_pct: 0.02
  min_risk_reward: 1.5
  stop_loss_atr_mult: 2.0
  take_profit_atr_mult: 3.0
signals:
  min_confidence: 0.4
  confidence_scale: 10.0
  weights:
    trend: 0.25
    momentum: 0.25
    reversal: 0.2
    volatility: 0.15
    price_action: 0.15
  multi_timeframe_bonus: 2
  ai_weight: 0.5
indicators:
  categories:
  - trend
  - momentum
  - volatility
  - volume
  - support
  - fundamental
ai:
  enabled: true
  model: claude-opus-4-7
  timeframe: 1m
  max_tokens: 2000
data:
  lookback_days: 365
  interval: 1d
trader:
  interval_seconds: 300
  enforce_market_hours: false
  slippage_bps: 5.0
  dry_run: false
